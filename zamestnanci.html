<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Manažeři — Nutworld</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#5c381f;--br:#83502e;--kraft:#f1e6da;--acc:#da1668;--amb:#f7ab31;--leaf:#6fa044}
body{font-family:"Source Sans 3",Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--bd);padding:11px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:white}
.topbar a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.topbar a:hover{color:white}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.btn-top{background:var(--amb);border:none;color:var(--bd);font-family:"Exo 2",sans-serif;font-weight:800;font-size:13px;padding:7px 16px;border-radius:20px;cursor:pointer}
.btn-top:hover{filter:brightness(1.08)}

/* ALERT BANNER */
.alert-bar{display:none;margin:16px 16px 0;max-width:1060px;margin-left:auto;margin-right:auto}
.alert-item{border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.alert-overdue{background:#fde8ef;border-left:4px solid var(--acc)}
.alert-today{background:#fff8e1;border-left:4px solid var(--amb)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-text strong{font-family:"Exo 2",sans-serif;font-weight:700}

/* LAYOUT */
.wrap{max-width:1060px;margin:0 auto;padding:20px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* KARTA */
.card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.09);display:flex;flex-direction:column}
.card-header{padding:16px 18px 14px;display:flex;gap:13px;align-items:flex-start;border-bottom:1px solid #f0e8df}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:white;flex-shrink:0}
.av-0{background:linear-gradient(135deg,#5c381f,#83502e)}
.av-1{background:linear-gradient(135deg,#b8860b,#c9982e)}
.av-2{background:linear-gradient(135deg,#1a4a7a,#2e78c0)}
.av-3{background:linear-gradient(135deg,#da1668,#e84d8a)}
.av-4{background:linear-gradient(135deg,#2d5a1b,#6fa044)}
.av-5{background:linear-gradient(135deg,#6b2f6b,#a855a8)}
.av-6{background:linear-gradient(135deg,#7a3a1a,#c06030)}
.av-7{background:linear-gradient(135deg,#1a5c4a,#2da882)}
.av-8{background:linear-gradient(135deg,#3a3a6b,#6868b8)}
.mgr-name{font-family:"Exo 2",sans-serif;font-size:15px;font-weight:800;color:var(--bd);margin-bottom:1px}
.mgr-role{font-size:11px;font-weight:600;color:var(--br);margin-bottom:6px}
.mgr-links{display:flex;gap:6px;flex-wrap:wrap}
.link-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:12px;text-decoration:none;border:1.5px solid;cursor:pointer;background:none;font-family:inherit;transition:all .12s}
.link-mail{color:var(--br);border-color:#d4c0a8}
.link-mail:hover{background:var(--kraft)}
.link-trello{color:#0052cc;border-color:#b3c8f0}
.link-trello:hover{background:#e8f0fe}
.link-trello-add{color:#a08060;border-color:#d4c0a8;font-size:10px}
.link-trello-add:hover{background:var(--kraft)}
.link-del{color:#c0a880;border-color:transparent;font-size:10px;margin-left:auto}
.link-del:hover{color:var(--acc)}

/* ÚKOLY */
.section{padding:12px 18px;border-bottom:1px solid #f0e8df}
.section-title{font-family:"Exo 2",sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#a08060;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.badge{background:var(--acc);color:white;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:800}
.badge-amb{background:var(--amb);color:var(--bd)}
.task-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f8f4f0}
.task-item:last-child{border-bottom:none}
.task-check{width:16px;height:16px;accent-color:var(--br);flex-shrink:0;margin-top:2px;cursor:pointer}
.task-text{flex:1;font-size:12.5px;line-height:1.4;word-break:break-word}
.task-text.done{text-decoration:line-through;color:#b0966a}
.task-due{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.due-ok{color:#a08060;background:#f5f0ea}
.due-today{color:#7a4a00;background:#fff0b0}
.due-over{color:white;background:var(--acc)}
.task-del{background:none;border:none;color:#d4c0a8;font-size:13px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1}
.task-del:hover{color:var(--acc)}
.add-task{display:flex;gap:6px;align-items:center}
.task-input{flex:1;border:1.5px solid #d4c0a8;border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit;background:#fdf9f6}
.task-input:focus{outline:none;border-color:var(--br)}
.date-input{border:1.5px solid #d4c0a8;border-radius:7px;padding:5px 7px;font-size:11px;font-family:inherit;background:#fdf9f6;color:#5a3a1a;width:115px}
.date-input:focus{outline:none;border-color:var(--br)}
.btn-addtask{background:var(--bd);border:none;border-radius:7px;color:white;font-size:16px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-addtask:hover{filter:brightness(1.15)}

/* POZNÁMKY */
.notes-section{padding:12px 18px;flex:1;display:flex;flex-direction:column}
.notes{width:100%;border:1.5px solid #ede0d4;border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;line-height:1.6;background:#fdf9f6;transition:border-color .15s;flex:1}
.notes:focus{outline:none;border-color:var(--br);background:white}
.notes::placeholder{color:#c0a880}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:white;border-radius:16px;padding:26px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:13px}
.modal h2{font-family:"Exo 2",sans-serif;font-size:17px;font-weight:800;color:var(--bd)}
.modal label{font-size:11px;font-weight:600;color:var(--br);display:block;margin-bottom:3px}
.modal input{width:100%;border:1.5px solid #d4c0a8;border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;background:#fdf9f6}
.modal input:focus{outline:none;border-color:var(--br)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:2px}
.btn-cancel{background:#f0e8df;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--br);cursor:pointer;font-family:inherit}
.btn-save{background:var(--bd);border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:white;cursor:pointer;font-family:inherit}

/* TRELLO MODAL */
.trello-modal{background:white;border-radius:16px;padding:26px;width:90%;max-width:380px;display:flex;flex-direction:column;gap:13px}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">👥 Manažeři</span>
  <a href="/ja.html">← Dashboard</a>
  <div class="topbar-right">
    <button class="btn-top" onclick="openModal()">+ Přidat manažera</button>
  </div>
</div>

<div id="alert-bar" class="alert-bar"></div>
<div class="wrap" id="grid"></div>

<!-- Modal: Přidat manažera -->
<div class="overlay" id="overlay-add">
  <div class="modal">
    <h2>Přidat manažera</h2>
    <div><label>Jméno a příjmení</label><input id="m-name" placeholder="Jana Nývltová"/></div>
    <div><label>Pozice / oblast</label><input id="m-role" placeholder="Provozní ředitel"/></div>
    <div><label>Email</label><input id="m-email" placeholder="jana.nyvltova@nutworld.cz"/></div>
    <div><label>Telefon (volitelné)</label><input id="m-phone" placeholder="+420 777 000 000"/></div>
    <div><label>Trello URL (volitelné)</label><input id="m-trello" placeholder="https://trello.com/b/..."/></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('overlay-add')">Zrušit</button>
      <button class="btn-save" onclick="addManager()">Přidat</button>
    </div>
  </div>
</div>

<!-- Modal: Trello URL -->
<div class="overlay" id="overlay-trello">
  <div class="trello-modal">
    <h2>Trello board</h2>
    <div><label>URL Trello boardu pro tohoto manažera</label><input id="t-url" placeholder="https://trello.com/b/..."/></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('overlay-trello')">Zrušit</button>
      <button class="btn-save" onclick="saveTrello()">Uložit</button>
    </div>
  </div>
</div>

<script>
const MK = 'nw_managers_v2';
const TK = 'nw_tasks_v1';
const NK = 'nw_notes_v1';

const DEFAULTS = [
  {id:'jana-nyvltova',      name:'Jana Nývltová',       role:'Provozní ředitel',               email:'jana.nyvltova@nutworld.cz',       phone:'', trello:''},
  {id:'tomas-hamernik',     name:'Tomáš Hamerník',      role:'Obchodní manažer & vedoucí obchodu', email:'tomas.hamernik@nutworld.cz', phone:'', trello:''},
  {id:'martin-werner',      name:'Martin Werner',        role:'Obchodní manažer',               email:'martin.werner@nutworld.cz',       phone:'', trello:''},
  {id:'marketa-costachova', name:'Markéta Costachová',  role:'Obchodní manažer externí',       email:'marketa.costachova@nutworld.cz',  phone:'', trello:''},
  {id:'pavlina-prochazkova',name:'Pavlína Procházková', role:'Marketing',                      email:'pavlina.prochazkova@nutworld.cz', phone:'', trello:''},
  {id:'renata-posepna',     name:'Renata Pošepná',       role:'Vedoucí dárkové výroby',         email:'renata.posepna@nutworld.cz',      phone:'', trello:''},
  {id:'simona',             name:'Simona',               role:'Vedoucí balící výroby',          email:'',                                phone:'', trello:''},
  {id:'lucie-turkova',      name:'Lucie Turková',        role:'Legislativa & kvalita',          email:'lucie.turkova@nutworld.cz',       phone:'', trello:''},
  {id:'rita',               name:'Rita',                 role:'Vedoucí dopravy',                email:'',                                phone:'', trello:''},
];

const load  = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
const save  = (k, v)   => localStorage.setItem(k, JSON.stringify(v));
const mgrs  = ()       => load(MK, DEFAULTS);
const tasks = ()       => load(TK, {});
const notes = ()       => load(NK, {});

const TODAY = new Date().toISOString().slice(0,10);

function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.`;
}
function dueClass(iso) {
  if (!iso) return '';
  if (iso < TODAY) return 'due-over';
  if (iso === TODAY) return 'due-today';
  return 'due-ok';
}
function dueLabel(iso) {
  if (!iso) return '';
  if (iso < TODAY) return '⚠ ' + fmtDate(iso);
  if (iso === TODAY) return '⬤ dnes';
  return fmtDate(iso);
}
function initials(n) { return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

// --- ALERTS ---
function renderAlerts() {
  const all = tasks(), ms = mgrs();
  let html = '';
  ms.forEach(m => {
    (all[m.id]||[]).filter(t=>!t.done && t.due).forEach(t => {
      if (t.due < TODAY)
        html += `<div class="alert-item alert-overdue"><span class="alert-icon">🚨</span><span class="alert-text"><strong>${esc(m.name)}:</strong> ${esc(t.text)} — <em>po termínu ${fmtDate(t.due)}</em></span></div>`;
      else if (t.due === TODAY)
        html += `<div class="alert-item alert-today"><span class="alert-icon">⏰</span><span class="alert-text"><strong>${esc(m.name)}:</strong> ${esc(t.text)} — <em>dnes!</em></span></div>`;
    });
  });
  const bar = document.getElementById('alert-bar');
  bar.innerHTML = html;
  bar.style.display = html ? 'block' : 'none';
}

// --- RENDER ---
function render() {
  const ms = mgrs(), ts = tasks(), ns = notes();
  document.getElementById('grid').innerHTML = ms.map((m,i) => {
    const mt = ts[m.id] || [];
    const open = mt.filter(t=>!t.done);
    const overdue = open.filter(t=>t.due && t.due < TODAY).length;
    const dueToday = open.filter(t=>t.due === TODAY).length;
    const badgeHtml = overdue
      ? `<span class="badge">${overdue} po term.</span>`
      : dueToday ? `<span class="badge badge-amb">${dueToday} dnes</span>` : '';

    const trelloHtml = m.trello
      ? `<a class="link-btn link-trello" href="${esc(m.trello)}" target="_blank">🗂 Trello</a>
         <button class="link-btn link-trello-add" onclick="editTrello('${m.id}')">✏</button>`
      : `<button class="link-btn link-trello-add" onclick="editTrello('${m.id}')">+ Trello</button>`;

    const tasksHtml = mt.map(t => `
      <div class="task-item" id="ti-${t.id}">
        <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${m.id}','${t.id}',this.checked)"/>
        <span class="task-text ${t.done?'done':''}">${esc(t.text)}</span>
        ${t.due ? `<span class="task-due ${dueClass(t.due)}">${dueLabel(t.due)}</span>` : ''}
        <button class="task-del" onclick="delTask('${m.id}','${t.id}')">✕</button>
      </div>`).join('');

    return `<div class="card">
      <div class="card-header">
        <div class="avatar av-${i%9}">${esc(initials(m.name))}</div>
        <div style="flex:1;min-width:0">
          <div class="mgr-name">${esc(m.name)}</div>
          <div class="mgr-role">${esc(m.role)}</div>
          <div class="mgr-links">
            ${m.email ? `<a class="link-btn link-mail" href="mailto:${esc(m.email)}">✉ Email</a>` : ''}
            ${m.phone ? `<a class="link-btn link-mail" href="tel:${esc(m.phone)}">📞 ${esc(m.phone)}</a>` : ''}
            ${trelloHtml}
            <button class="link-btn link-del" onclick="deleteManager('${m.id}')">Odebrat</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📋 Úkoly ${badgeHtml}</div>
        <div class="task-list">${tasksHtml}</div>
        <div class="add-task">
          <input class="task-input" id="ti-${m.id}" placeholder="Nový úkol…" onkeydown="if(event.key==='Enter')addTask('${m.id}')"/>
          <input class="date-input" type="date" id="td-${m.id}" value="" min="${TODAY}"/>
          <button class="btn-addtask" onclick="addTask('${m.id}')" title="Přidat">+</button>
        </div>
      </div>

      <div class="notes-section">
        <div class="section-title" style="margin-bottom:6px">💬 Poznámky</div>
        <textarea class="notes" placeholder="Témata, aktuální situace, co sledovat…" onblur="saveNote('${m.id}',this.value)">${esc(ns[m.id]||'')}</textarea>
      </div>
    </div>`;
  }).join('');
  renderAlerts();
}

// --- TASKS ---
function addTask(mid) {
  const inp = document.getElementById('ti-'+mid);
  const datInp = document.getElementById('td-'+mid);
  const text = inp.value.trim();
  if (!text) return;
  const ts = tasks();
  if (!ts[mid]) ts[mid] = [];
  ts[mid].unshift({ id: Date.now().toString(36), text, due: datInp.value||'', done: false });
  save(TK, ts);
  inp.value = ''; datInp.value = '';
  render();
}
function toggleTask(mid, tid, done) {
  const ts = tasks();
  const t = (ts[mid]||[]).find(x=>x.id===tid);
  if (t) { t.done = done; save(TK, ts); render(); }
}
function delTask(mid, tid) {
  const ts = tasks();
  ts[mid] = (ts[mid]||[]).filter(x=>x.id!==tid);
  save(TK, ts); render();
}

// --- NOTES ---
function saveNote(mid, val) {
  const ns = notes();
  ns[mid] = val;
  save(NK, ns);
}

// --- MANAGERS ---
let _trelloEditing = null;
function editTrello(mid) {
  _trelloEditing = mid;
  const m = mgrs().find(x=>x.id===mid);
  document.getElementById('t-url').value = m?.trello||'';
  document.getElementById('overlay-trello').classList.add('open');
  document.getElementById('t-url').focus();
}
function saveTrello() {
  const ms = mgrs();
  const m = ms.find(x=>x.id===_trelloEditing);
  if (m) { m.trello = document.getElementById('t-url').value.trim(); save(MK, ms); }
  closeModal('overlay-trello'); render();
}

function deleteManager(mid) {
  if (!confirm('Odebrat manažera ze seznamu?')) return;
  save(MK, mgrs().filter(m=>m.id!==mid)); render();
}

function openModal() {
  document.getElementById('overlay-add').classList.add('open');
  document.getElementById('m-name').focus();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function addManager() {
  const name  = document.getElementById('m-name').value.trim();
  const role  = document.getElementById('m-role').value.trim();
  const email = document.getElementById('m-email').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const trello= document.getElementById('m-trello').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const id = name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') + '-' + Date.now().toString(36);
  const ms = mgrs();
  ms.push({id, name, role, email, phone, trello});
  save(MK, ms);
  closeModal('overlay-add');
  ['m-name','m-role','m-email','m-phone','m-trello'].forEach(f=>document.getElementById(f).value='');
  render();
}

document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); })
);
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open'));
});

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

render();
</script>
</body>
</html>
