<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Manažeři — Nutworld</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#5c381f;--br:#83502e;--kraft:#f1e6da;--acc:#da1668;--amb:#f7ab31;--leaf:#6fa044}
body{font-family:"Source Sans 3",Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;min-height:100vh}
.topbar{background:var(--bd);padding:11px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:white}
.topbar a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.topbar a:hover{color:white}
.topbar-right{margin-left:auto}
.btn-add{background:var(--amb);border:none;color:var(--bd);font-family:"Exo 2",sans-serif;font-weight:800;font-size:13px;padding:7px 16px;border-radius:20px;cursor:pointer}
.btn-add:hover{filter:brightness(1.08)}

.wrap{max-width:1060px;margin:0 auto;padding:24px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* KARTA */
.card{background:white;border-radius:14px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:14px;position:relative}
.card-top{display:flex;gap:14px;align-items:flex-start}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Exo 2",sans-serif;font-size:18px;font-weight:800;color:white;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:var(--bd);margin-bottom:2px}
.card-role{font-size:12px;font-weight:600;color:var(--br);margin-bottom:6px}
.card-contact{display:flex;flex-direction:column;gap:3px}
.contact-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b4c30}
.contact-row a{color:var(--br);text-decoration:none}
.contact-row a:hover{text-decoration:underline}
.contact-edit{border:none;background:transparent;font-size:12px;color:#6b4c30;font-family:inherit;padding:0;cursor:text;width:100%;outline:none}
.contact-edit:focus{color:var(--bd)}
.contact-edit::placeholder{color:#c0a880}

/* POZNÁMKY */
.notes-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#a08060;font-weight:600;margin-bottom:4px}
.notes{width:100%;border:1.5px solid #ede0d4;border-radius:8px;padding:9px 11px;font-size:12px;font-family:inherit;color:#2a1a0e;resize:vertical;min-height:70px;line-height:1.6;background:#fdf9f6;transition:border-color .15s}
.notes:focus{outline:none;border-color:var(--br);background:white}
.notes::placeholder{color:#c0a880}
.notes-saved{font-size:10px;color:var(--leaf);margin-top:3px;height:14px;transition:opacity .3s}

/* AKCE */
.card-actions{display:flex;gap:8px;margin-top:auto}
.btn-mail{display:inline-flex;align-items:center;gap:5px;background:var(--kraft);border:none;border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--bd);cursor:pointer;text-decoration:none;font-family:inherit}
.btn-mail:hover{background:#e8d8c5}
.btn-del{margin-left:auto;background:none;border:none;color:#c0a880;font-size:16px;cursor:pointer;padding:4px;line-height:1}
.btn-del:hover{color:var(--acc)}

/* BARVY AVATARŮ */
.av-0{background:linear-gradient(135deg,#5c381f,#83502e)}
.av-1{background:linear-gradient(135deg,#b8860b,#f7ab31)}
.av-2{background:linear-gradient(135deg,#da1668,#e84d8a)}
.av-3{background:linear-gradient(135deg,#2d5a1b,#6fa044)}
.av-4{background:linear-gradient(135deg,#1a4a7a,#2e78c0)}
.av-5{background:linear-gradient(135deg,#6b2f6b,#a855a8)}
.av-6{background:linear-gradient(135deg,#7a3a1a,#c06030)}
.av-7{background:linear-gradient(135deg,#1a5c4a,#2da882)}

/* MODAL — přidat manažera */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:white;border-radius:16px;padding:28px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:14px}
.modal h2{font-family:"Exo 2",sans-serif;font-size:18px;font-weight:800;color:var(--bd)}
.modal label{font-size:12px;font-weight:600;color:var(--br);display:block;margin-bottom:4px}
.modal input{width:100%;border:1.5px solid #d4c0a8;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;background:#fdf9f6}
.modal input:focus{outline:none;border-color:var(--br)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.btn-cancel{background:#f0e8df;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--br);cursor:pointer;font-family:inherit}
.btn-save{background:var(--bd);border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:white;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">👥 Manažeři</span>
  <a href="/ja.html">← Dashboard</a>
  <div class="topbar-right">
    <button class="btn-add" onclick="openModal()">+ Přidat</button>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Přidat manažera</h2>
    <div>
      <label>Jméno a příjmení</label>
      <input id="m-name" placeholder="Jana Nývltová"/>
    </div>
    <div>
      <label>Pozice / oblast</label>
      <input id="m-role" placeholder="Provozní ředitel"/>
    </div>
    <div>
      <label>Email</label>
      <input id="m-email" placeholder="jana.nyvltova@nutworld.cz"/>
    </div>
    <div>
      <label>Telefon (volitelné)</label>
      <input id="m-phone" placeholder="+420 777 000 000"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Zrušit</button>
      <button class="btn-save" onclick="addManager()">Přidat</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'nw_managers_v1';
const NOTES_KEY   = 'nw_manager_notes_v1';

const DEFAULT_MANAGERS = [
  { id:'jana-nyvltova',      name:'Jana Nývltová',       role:'Provozní ředitel',              email:'jana.nyvltova@nutworld.cz',       phone:'' },
  { id:'tomas-hamernik',     name:'Tomáš Hamerník',      role:'Obchodní manažer, vedoucí obchodu', email:'tomas.hamernik@nutworld.cz',  phone:'' },
  { id:'martin-werner',      name:'Martin Werner',        role:'Obchodní manažer',              email:'martin.werner@nutworld.cz',       phone:'' },
  { id:'marketa-costachova', name:'Markéta Costachová',   role:'Obchodní manažer externí',      email:'marketa.costachova@nutworld.cz',  phone:'' },
  { id:'pavlina-prochazkova',name:'Pavlína Procházková',  role:'Marketing',                     email:'pavlina.prochazkova@nutworld.cz', phone:'' },
  { id:'renata-posepna',     name:'Renata Pošepná',       role:'Vedoucí dárkové výroby',        email:'renata.posepna@nutworld.cz',      phone:'' },
  { id:'simona',             name:'Simona',               role:'Vedoucí balící výroby',         email:'',                                phone:'' },
  { id:'lucie-turkova',      name:'Lucie Turková',        role:'Legislativa & kvalita',         email:'lucie.turkova@nutworld.cz',       phone:'' },
  { id:'rita',               name:'Rita',                 role:'Vedoucí dopravy',               email:'',                                phone:'' },
];

function loadManagers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_MANAGERS; }
  catch { return DEFAULT_MANAGERS; }
}
function saveManagers(m) { localStorage.setItem(STORAGE_KEY, JSON.stringify(m)); }

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }
  catch { return {}; }
}
function saveNote(id, text) {
  const notes = loadNotes();
  notes[id] = text;
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

function initials(name) {
  return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function avatarClass(index) {
  return 'av-' + (index % 8);
}

function renderCard(mgr, index) {
  const notes = loadNotes();
  const note  = notes[mgr.id] || '';
  const emailHtml = mgr.email
    ? `<div class="contact-row">✉️ <a href="mailto:${esc(mgr.email)}">${esc(mgr.email)}</a></div>`
    : `<div class="contact-row">✉️ <input class="contact-edit" placeholder="doplnit email" value="" onblur="saveField('${mgr.id}','email',this.value)"/></div>`;
  const phoneHtml = mgr.phone
    ? `<div class="contact-row">📞 <a href="tel:${esc(mgr.phone)}">${esc(mgr.phone)}</a></div>`
    : `<div class="contact-row">📞 <input class="contact-edit" placeholder="doplnit telefon" value="" onblur="saveField('${mgr.id}','phone',this.value)"/></div>`;

  return `<div class="card" id="card-${mgr.id}">
    <div class="card-top">
      <div class="avatar ${avatarClass(index)}">${esc(initials(mgr.name))}</div>
      <div class="card-info">
        <div class="card-name">${esc(mgr.name)}</div>
        <div class="card-role">${esc(mgr.role)}</div>
        <div class="card-contact">
          ${emailHtml}
          ${phoneHtml}
        </div>
      </div>
    </div>
    <div>
      <div class="notes-label">Poznámky / témata</div>
      <textarea class="notes" placeholder="Aktuální témata, úkoly, co řešit…" onblur="onNoteBlur('${mgr.id}',this)" oninput="onNoteInput('${mgr.id}',this)">${esc(note)}</textarea>
      <div class="notes-saved" id="saved-${mgr.id}"></div>
    </div>
    <div class="card-actions">
      ${mgr.email ? `<a class="btn-mail" href="mailto:${esc(mgr.email)}">✉️ Napsat</a>` : ''}
      <button class="btn-del" onclick="deleteManager('${mgr.id}')" title="Odebrat">✕</button>
    </div>
  </div>`;
}

function render() {
  const managers = loadManagers();
  document.getElementById('grid').innerHTML = managers.map((m,i) => renderCard(m,i)).join('');
}

function onNoteBlur(id, el) {
  saveNote(id, el.value);
  const s = document.getElementById('saved-'+id);
  if (s) { s.textContent = '✓ uloženo'; setTimeout(() => { s.textContent=''; }, 2000); }
}
function onNoteInput(id, el) {
  const s = document.getElementById('saved-'+id);
  if (s) s.textContent = '';
}

function saveField(id, field, value) {
  const managers = loadManagers();
  const m = managers.find(x => x.id === id);
  if (m) {
    m[field] = value.trim();
    saveManagers(managers);
    render();
  }
}

function deleteManager(id) {
  if (!confirm('Odebrat manažera?')) return;
  const managers = loadManagers().filter(m => m.id !== id);
  saveManagers(managers);
  render();
}

function openModal() { document.getElementById('overlay').classList.add('open'); document.getElementById('m-name').focus(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function addManager() {
  const name  = document.getElementById('m-name').value.trim();
  const role  = document.getElementById('m-role').value.trim();
  const email = document.getElementById('m-email').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const id = name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const managers = loadManagers();
  managers.push({ id, name, role, email, phone });
  saveManagers(managers);
  closeModal();
  ['m-name','m-role','m-email','m-phone'].forEach(f => document.getElementById(f).value='');
  render();
}

document.getElementById('overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

render();
</script>
</body>
</html>
