body{font-family:"Source Sans 3",Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;min-height:100vh}
.topbar{background:var(--bd);padding:11px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:white}
.topbar a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.topbar a:hover{color:white}
.wrap{max-width:1100px;margin:0 auto;padding:28px 16px}
.search-box{background:white;border-radius:16px;padding:28px 28px 24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:24px}

.search-row{display:flex;gap:10px;align-items:center}
.search-input{flex:1;border:2px solid #d4c0a8;border-radius:10px;padding:12px 16px;font-size:16px;font-family:inherit;background:#fdf9f6;transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--br);background:white}
.product-badge{display:inline-flex;align-items:center;gap:8px;background:var(--kraft);border:2px solid var(--br);border-radius:10px;padding:8px 16px;font-family:"Exo 2",sans-serif;font-weight:700;font-size:14px;color:var(--bd)}
.product-badge .kod{background:var(--br);color:white;border-radius:6px;padding:2px 8px;font-size:13px}
.results-header{font-family:"Exo 2",sans-serif;font-size:14px;font-weight:600;color:var(--br);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.card{background:white;border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid var(--kraft);transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.12);border-left-color:var(--br)}
.card-kod{font-family:"Exo 2",sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--br);text-transform:uppercase;margin-bottom:3px}
.card-name{font-family:"Exo 2",sans-serif;font-size:14px;font-weight:700;color:var(--bd);margin-bottom:10px;line-height:1.3}
.chip{display:inline-block;background:var(--kraft);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--br);margin-bottom:10px}
.obsah{font-size:12px;color:#5a3a1a;line-height:1.7}
.obsah-item{display:inline-block;margin-right:4px;margin-bottom:3px;background:#f5f0ea;border-radius:5px;padding:2px 7px}
.obsah-item.match{background:#5c381f;color:white;font-weight:700}
.ceny{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid #ede0d4}
.cena-mo{font-family:"Exo 2",sans-serif;font-size:17px;font-weight:800;color:var(--acc)}
.cena-vo{font-size:12px;color:#888;align-self:flex-end;padding-bottom:2px}
.empty{text-align:center;padding:48px 20px;color:#a08060;font-size:14px}
.empty .icon{font-size:40px;margin-bottom:10px}
.hint{text-align:center;padding:48px 20px;color:#a08060}
.hint .icon{font-size:48px;margin-bottom:12px}
.hint p{font-size:14px;line-height:1.7}
.hint code{background:var(--kraft);padding:2px 7px;border-radius:4px;font-family:monospace;color:var(--bd)}
</style>

  headerEl.style.display = 'block';
  if (hits.length === 0) {
    headerEl.textContent = '';
    resultsEl.innerHTML = `<div class="empty"><div class="icon">🔎</div>Žádný dárek s kódem <strong>${esc(q)}</strong> nenalezen.</div>`;
    return;
  }

  // Sort by name
  hits.sort((a, b) => a.darek.nazev.localeCompare(b.darek.nazev, 'cs'));
  headerEl.textContent = `${hits.length} dárk${hits.length === 1 ? '' : hits.length < 5 ? 'y' : 'ů'} obsahuje produkt ${q}${productName ? ' (' + productName.split(' ').slice(0,3).join(' ') + '...)' : ''}`;
  resultsEl.innerHTML = `<div class="grid">${hits.map(h => renderCard(h, q)).join('')}</div>`;
}

function renderCard(hit, q) {
  const d = hit.darek;
  const obsahItems = d.obsah.split(',').map(item => {
    const [kod, gramaz] = item.trim().split(':');
    const isMatch = kod === q;
    const name = cenik[kod] ? cenik[kod].split(' ').slice(0,3).join(' ') : kod;
    return `<span class="obsah-item${isMatch ? ' match' : ''}" title="${esc(cenik[kod]||kod)}">${esc(kod)} ${gramaz ? gramaz+'g' : ''}</span>`;
  }).join('');
  return `<div class="card">
    <div class="card-kod">${esc(d.kod)}</div>
    <div class="card-name">${esc(d.nazev)}</div>
    <div><span class="chip">${esc(d.obal)}</span></div>
    <div class="obsah">${obsahItems}</div>
    <div class="ceny">
      <div class="cena-mo">${esc(d.cena)} Kč</div>
      <div class="cena-vo">VO ${esc(d.vo)} Kč</div>
    </div>
  </div>`;
}

function renderHint() {
  return `<div class="hint">
    <div class="icon">🐿️</div>
    <p>Sem napiš kód produktu a hned uvidíš,<br>ve kterých dárcích je obsažený.<br><br>
    Třeba <code>89</code> (mandle uzené) nebo <code>101</code> (kešu přírodní).</p>
  </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
document.getElementById('results').innerHTML = renderHint();
</script>
</body>
</html>
