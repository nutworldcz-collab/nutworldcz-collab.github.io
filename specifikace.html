<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nutworld — Specifikace produktů</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#5c381f;--br:#83502e;--kraft:#f1e6da;--acc:#da1668;--leaf:#6fa044;--amb:#f7ab31}
body{font-family:'Source Sans 3',Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;font-size:14px;min-height:100vh}
.topbar{background:var(--bd);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar-title{font-family:'Exo 2',sans-serif;font-size:17px;font-weight:800;color:white}
.topbar a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.topbar a:hover{color:white}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.refresh-info{font-size:11px;color:rgba(255,255,255,.5)}
.btn-sm{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:inherit}
.btn-sm:hover{background:rgba(255,255,255,.25)}

.container{max-width:1100px;margin:0 auto;padding:16px}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #d4c0a8;border-radius:8px;font-size:14px;font-family:inherit;background:white}
.search-wrap input:focus{outline:none;border-color:var(--br)}

/* Kategorie tabs */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cat-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #d4c0a8;background:white;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#666;transition:all .15s;white-space:nowrap}
.cat-btn:hover:not(.active){background:var(--kraft)}
.cat-btn.active{color:white;border-color:transparent}
.cat-btn[data-cat="vse"].active{background:var(--bd)}
.cat-btn[data-cat="orechy"].active{background:#83502e}
.cat-btn[data-cat="ovoce"].active{background:#da1668}
.cat-btn[data-cat="seminko"].active{background:#6fa044}
.cat-btn[data-cat="ostatni"].active{background:#546e7a}

/* Podkategorie filter */
.sub-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;min-height:28px}
.sub-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #d4c0a8;background:white;font-size:11px;font-weight:600;cursor:pointer;color:#666;white-space:nowrap}
.sub-btn.active{background:var(--kraft);border-color:var(--br);color:var(--bd)}
.sub-btn:hover:not(.active){background:#f5ede4}

/* Stats */
.stats{font-size:12px;color:#888;margin-bottom:12px}
.stats strong{color:var(--bd)}

/* Grid */
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* Karta */
.spec-card{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:3px solid #ccc;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
.spec-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.13)}
.spec-card[data-cat="orechy"]{border-top-color:#83502e}
.spec-card[data-cat="ovoce"]{border-top-color:#da1668}
.spec-card[data-cat="seminko"]{border-top-color:#6fa044}
.spec-card[data-cat="ostatni"]{border-top-color:#546e7a}
.sc-header{display:flex;align-items:flex-start;gap:8px}
.sc-kod{font-family:monospace;font-size:11px;color:#aaa;background:#f5ede4;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.sc-nazev{font-family:'Exo 2',sans-serif;font-weight:700;font-size:13px;color:var(--bd);line-height:1.3}
.sc-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.sc-sub{font-size:11px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:10px}
.sc-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sc-cat.orechy{color:#83502e}
.sc-cat.ovoce{color:#da1668}
.sc-cat.seminko{color:#6fa044}
.sc-cat.ostatni{color:#546e7a}
.sc-actions{display:flex;gap:7px;margin-top:2px}
.btn-pdf{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:none;font-family:'Exo 2',sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-decoration:none;background:#e3f2fd;color:#1565c0;flex:1;justify-content:center}
.btn-pdf:hover{background:#bbdefb}
.btn-trello{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:8px;border:1.5px solid #d4c0a8;background:white;font-family:'Exo 2',sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-decoration:none;color:#555}
.btn-trello:hover{background:var(--kraft)}

/* Loading */
.state-box{background:white;border-radius:12px;padding:48px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07);grid-column:1/-1}
.state-box p{color:#888;font-size:14px;margin-top:8px}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid var(--kraft);border-top-color:var(--br);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Směsi */
.mix-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);border-top:3px solid #2196f3}
.mix-head{background:linear-gradient(135deg,#1a3a5c,#2196f3);color:white;padding:10px 14px}
.mix-kod{font-family:monospace;font-size:10px;opacity:.7;margin-bottom:2px}
.mix-nazev{font-family:"Exo 2",sans-serif;font-size:13px;font-weight:800;line-height:1.2}
.mix-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;font-size:11.5px}
.mix-sec label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#2196f3;margin-bottom:4px}
.mix-sec p{line-height:1.7;color:#1a1a1a}
b.al{font-weight:700;background:#fff0f0;border-radius:2px;padding:0 1px}
.al-box{background:#fff5f7;border:1.5px solid #da1668;border-radius:6px;padding:6px 10px;font-size:11px;color:#6b2f2f}
.al-box strong{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;color:#da1668}
.stopy-box{background:#fff8e1;border:1px solid #f7ab31;border-radius:6px;padding:5px 9px;font-size:10.5px;color:#5c3000}
.mix-foot{display:grid;grid-template-columns:1fr 1fr;gap:4px;border-top:1px solid #e8f0fe;padding-top:8px;margin-top:4px}
.mf label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#bbb;display:block}
.mf span{font-size:10.5px;color:#555}
</style>

</head>
<body>

<div class="topbar">
  <span class="topbar-title">📋 Specifikace produktů</span>
  <a href="/">← Rozcestník</a>
  <div class="topbar-right">
    <span class="refresh-info" id="refresh-info">načítám…</span>
    <button class="btn-sm" onclick="loadAll()">↻ Obnovit</button>
  </div>
</div>

<div class="container">

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Hledat název nebo kód (např. mandle, 101)…" oninput="render()"/>
    </div>
  </div>

  <div class="cat-tabs">
    <button class="cat-btn active" data-cat="vse" onclick="setCat('vse',this)">Vše</button>
    <button class="cat-btn" data-cat="orechy" onclick="setCat('orechy',this)">🥜 Ořechy</button>
    <button class="cat-btn" data-cat="ovoce" onclick="setCat('ovoce',this)">🍓 Sušené ovoce</button>
    <button class="cat-btn" data-cat="seminko" onclick="setCat('seminko',this)">🌱 Semínka</button>
    <button class="cat-btn" data-cat="smesi" onclick="setCat('smesi',this)">🔀 Směsi NW</button>
    <button class="cat-btn" data-cat="ostatni" onclick="setCat('ostatni',this)">📦 Ostatní</button>
  </div>

  <div class="sub-wrap" id="sub-wrap"></div>

  <div class="stats" id="stats"></div>

  <div class="spec-grid" id="grid">
    <div class="state-box"><div class="spinner"></div><p>Načítám specifikace ze všech kategorií…</p></div>
  </div>

</div>

const KEY   = atob('MDM2M2ViYjE0OWRmMDRkMTI4NTY3MmEzMDgwMTYwYTI=');
const TOKEN = atob('QVRUQTdiMWI4YTFjZWRjMTIyODI3ZmRiMmY4MGRjMjRiNThkMTA4NTVkOTY3ZTAwNDViNWU0ZDdkNmZkMzQwYzJmZWFDNEYxMTFGRQ==');
const BOARDS = [
  {id:'69d499ec3501b275fe7b9ffc',cat:'orechy', label:'Ořechy'},
  {id:'69cbb206544677ef5af0cccc',cat:'ovoce',  label:'Sušené ovoce'},
  {id:'69d49adcbe3c129e1836cb06',cat:'seminko',label:'Semínka'},
  {id:'69d5ee3d524fd628d0ad6bbe',cat:'ostatni',label:'Ostatní'},
];
const CACHE_KEY='nw_specifikace_v2';
let allItems=[], activeCat='vse', activeSub='vse';

function api(path,params={}){
  const qs=new URLSearchParams({key:KEY,token:TOKEN,...params}).toString();
  return fetch(`https://api.trello.com/1${path}?${qs}`).then(r=>r.json());
}
function saveCache(d){try{localStorage.setItem(CACHE_KEY,JSON.stringify({d,ts:Date.now()}));}catch(e){}}
function loadCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){return null;}}
function parsePdf(desc){if(!desc)return null;const m=desc.match(/\(https?:\/\/[^)]+\.pdf[^)]*\)/i);return m?m[0].slice(1,-1):null;}
function parseKod(n){const m=n.match(/^([\w\/]+)\//);return m?m[1].trim():null;}
function parseNazev(n){const i=n.indexOf('/');return i>-1?n.slice(i+1).trim():n.trim();}

async function loadBoard(b){
  const [lists,cards]=await Promise.all([api(`/boards/${b.id}/lists`,{fields:'name,id'}),api(`/boards/${b.id}/cards`,{fields:'name,desc,idList,url',filter:'open'})]);
  const lm={};lists.forEach(l=>lm[l.id]=l.name);
  return cards.map(c=>({typ:'produkt',nazev:parseNazev(c.name),kod:parseKod(c.name),cat:b.cat,catLabel:b.label,sub:lm[c.idList]||'—',url:c.url,pdfUrl:parsePdf(c.desc),raw:c.name.toLowerCase()}));
}

async function loadAll(){
  const cache=loadCache();
  if(cache){allItems=[...cache.d,...MIX_DATA];render();const age=Math.round((Date.now()-cache.ts)/60000);document.getElementById('refresh-info').textContent=`cache (${age} min)`;}
  else{document.getElementById('refresh-info').textContent='načítám…';}
  try{
    const res=await Promise.all(BOARDS.map(loadBoard));
    const trello=res.flat();
    saveCache(trello);
    allItems=[...trello,...MIX_DATA];
    render();
    const now=new Date();
    document.getElementById('refresh-info').textContent=`Aktualizováno ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} · ${allItems.length} spec`;
  }catch(e){document.getElementById('refresh-info').textContent='chyba · cache';}
}

function setCat(cat,el){activeCat=cat;activeSub='vse';document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setSub(sub){activeSub=sub;document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub===sub));render();}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let items=allItems;
  if(activeCat!=='vse') items=items.filter(i=>i.cat===activeCat);
  if(activeSub!=='vse') items=items.filter(i=>i.sub===activeSub);
  if(q) items=items.filter(i=>(i.raw||i.nazev.toLowerCase()).includes(q)||(i.kod&&i.kod.toLowerCase().includes(q)));

  // Podkategorie — jen pro Trello kategorie
  const subWrap=document.getElementById('sub-wrap');
  if(activeCat!=='vse'&&activeCat!=='smesi'){
    const src=allItems.filter(i=>i.cat===activeCat&&i.typ==='produkt');
    const subs=[...new Set(src.map(i=>i.sub))].sort();
    subWrap.innerHTML=`<button class="sub-btn active" data-sub="vse" onclick="setSub('vse')">Vše (${src.length})</button>`+subs.map(s=>`<button class="sub-btn" data-sub="${esc(s)}" onclick="setSub('${esc(s)}')">${esc(s)} (${src.filter(i=>i.sub===s).length})</button>`).join('');
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.dataset.sub===activeSub));
  }else{subWrap.innerHTML='';}

  document.getElementById('stats').innerHTML=`Zobrazeno <strong>${items.length}</strong> z <strong>${allItems.length}</strong>`;

  if(!items.length){document.getElementById('grid').innerHTML='<div class="state-box"><p>🔍 Nic nenalezeno.</p></div>';return;}

  document.getElementById('grid').innerHTML=items.map(item=>
    item.typ==='mix' ? renderMix(item) : renderProdukt(item)
  ).join('');
}

function renderProdukt(item){
  const colors={orechy:'#83502e',ovoce:'#da1668',seminko:'#6fa044',ostatni:'#546e7a'};
  const c=colors[item.cat]||'#888';
  return `<div class="spec-card" data-cat="${item.cat}" style="border-top-color:${c}">
    <div class="sc-header">
      ${item.kod?`<span class="sc-kod">${esc(item.kod)}</span>`:''}
      <div class="sc-nazev">${esc(item.nazev)}</div>
    </div>
    <div class="sc-meta"><span class="sc-sub">${esc(item.sub)}</span><span class="sc-cat" style="color:${c};font-size:10px;font-weight:700">${esc(item.catLabel)}</span></div>
    <div class="sc-actions">
      ${item.pdfUrl?`<a class="btn-pdf" href="${esc(item.pdfUrl)}" target="_blank">📄 Otevřít PDF</a>`:`<a class="btn-pdf" href="${esc(item.url)}" target="_blank" style="background:#f5f5f5;color:#999">📄 PDF v Trellu</a>`}
      <a class="btn-trello" href="${esc(item.url)}" target="_blank" title="Trello">🃏</a>
    </div>
  </div>`;
}

function renderMix(m){
  return `<div class="mix-card">
    <div class="mix-head"><div class="mix-kod">${m.kod} · Směs NW</div><div class="mix-nazev">${esc(m.nazev)}</div></div>
    <div class="mix-body">
      <div class="mix-sec"><label>Složení</label><p>${m.slozeni||'<em style="color:#aaa">Složení nebylo importováno</em>'}</p></div>
      ${m.alergeny?`<div class="al-box"><strong>Alergeny</strong>${m.alergeny}</div>`:''}
      ${m.stopy?`<div class="stopy-box">⚠ ${m.stopy}</div>`:''}
      <div class="mix-foot">
        <div class="mf"><label>Výrobce</label><span>Nut World s.r.o.</span></div>
        <div class="mf"><label>Původ</label><span>Česká republika</span></div>
        <div class="mf"><label>Nák. cena</label><span>${m.blended} Kč/kg</span></div>
        <div class="mf"><label>Verze</label><span>Pracovní · 24.06.2026</span></div>
      </div>
    </div>
  </div>`;
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
loadAll();
