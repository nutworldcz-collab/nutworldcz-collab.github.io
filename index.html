<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nutworld — Nástroje</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',Arial,sans-serif;background:#e8ddd4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:800;color:#5c381f;margin-bottom:6px}
.sub{font-size:13px;color:#a07850;letter-spacing:2px;text-transform:uppercase;margin-bottom:48px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:560px}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
.card{background:white;border-radius:16px;padding:28px 24px;text-align:center;text-decoration:none;border:2px solid #d4c0a8;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card-icon{font-size:40px;display:block;margin-bottom:14px}
.card-title{font-family:'Exo 2',sans-serif;font-size:17px;font-weight:700;color:#5c381f;margin-bottom:6px}
.card-desc{font-size:13px;color:#8a6a4a;line-height:1.5}
.card.primary{background:linear-gradient(135deg,#5c381f,#83502e);border-color:transparent}
.card.primary .card-title{color:white}
.card.primary .card-desc{color:rgba(255,255,255,.75)}
.card.accent{background:linear-gradient(135deg,#b01252,#da1668);border-color:transparent}
.card.accent .card-title{color:white}
.card.accent .card-desc{color:rgba(255,255,255,.75)}
.footer{margin-top:36px;font-size:12px;color:#b09070}
</style>
</head>
<body>
<div class="logo">🐿 Nutworld</div>
<div class="sub">Interní nástroje</div>

<div style="width:100%;max-width:320px">
  <a class="card primary" href="/nabidky.html">
    <span class="card-icon">📄</span>
    <div class="card-title">Generátor nabídek</div>
    <div class="card-desc">Vytvoř nabídku pro zákazníka a stáhni PDF</div>
  </a>
</div>

<div class="footer">nutworldcz-collab.github.io</div>
</body>
</html>
