<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nutworld — Přehled marží</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--br:#83502e;--bd:#5c381f;--kraft:#f1e6da;--acc:#da1668;--amb:#f7ab31;--white:#fff}
body{font-family:'Source Sans 3',Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;font-size:13px}
.topbar{background:var(--bd);padding:12px 24px;display:flex;align-items:center;gap:16px}
.topbar-title{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;color:white}
.topbar-back{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.topbar-back:hover{color:white}
.tabs{display:flex;gap:0;background:var(--bd);padding:0 24px}
.tab{padding:10px 24px;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:var(--amb);border-bottom-color:var(--amb)}
.section{display:none;padding:20px 16px;max-width:1400px;margin:0 auto}
.section.active{display:block}
.controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search{border:1.5px solid #d4c0a8;border-radius:8px;padding:8px 12px;font-size:13px;background:white;width:260px;font-family:inherit}
.search:focus{outline:none;border-color:var(--br)}
select.filter{border:1.5px solid #d4c0a8;border-radius:8px;padding:8px 12px;font-size:13px;background:white;font-family:inherit}
.count{font-size:12px;color:#888;margin-left:auto}
table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);font-size:12.5px}
th{background:var(--bd);color:white;padding:8px 10px;text-align:left;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{background:var(--br)}
th.right,td.right{text-align:right}
th.center,td.center{text-align:center}
td{padding:6px 10px;border-bottom:1px solid #f0e8e0;color:#3d2912}
tr:nth-child(even) td{background:#fdf8f4}
tr:hover td{background:#f1e6da}
.m-high{color:#2e7d32;font-weight:700}
.m-mid{color:#e65100;font-weight:700}
.m-low{color:#c62828;font-weight:700}
.badge{display:inline-block;background:var(--kraft);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--br);font-family:monospace}
.hidden{display:none!important}
/* Sáčky — sticky header */
.tbl-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">🐿 Nutworld · Přehled marží</span>
  <a class="topbar-back" href="/">← Zpět na rozcestník</a>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('darky')">🎁 Dárky (279)</div>
  <div class="tab" onclick="showTab('sacky')">🛍️ Sáčky / Gramáže (94)</div>
</div>

<!-- DÁRKY -->
<div class="section active" id="sec-darky">
  <div class="controls">
    <input class="search" id="d-search" placeholder="Hledat název nebo kód…" oninput="filterDarky()"/>
    <select class="filter" id="d-obal" onchange="filterDarky()">
      <option value="">Všechny obaly</option>
      <option>dárková krabička</option>
      <option>dárková kazetka</option>
      <option>sáček s knírem</option>
      <option>sáček s kolíčkem</option>
      <option>vánoční sáček sob</option>
      <option>celofánek s mašličkou</option>
      <option>ořechový kornout</option>
      <option>zajíček</option>
      <option>kraft kelímek</option>
    </select>
    <select class="filter" id="d-marze" onchange="filterDarky()">
      <option value="">Všechny marže</option>
      <option value="high">Vysoká ≥50%</option>
      <option value="mid">Střední 35–50%</option>
      <option value="low">Nízká &lt;35%</option>
    </select>
    <span class="count" id="d-count"></span>
  </div>
  <table id="d-table">
    <thead><tr>
      <th onclick="sortTable('d-table',0)">Kód ↕</th>
      <th onclick="sortTable('d-table',1)">Název ↕</th>
      <th onclick="sortTable('d-table',2)">Typ obalu ↕</th>
      <th class="right" onclick="sortTable('d-table',3)">Náklady ↕</th>
      <th class="right" onclick="sortTable('d-table',4)">MO s DPH ↕</th>
      <th class="right" onclick="sortTable('d-table',5)">VO s DPH ↕</th>
      <th class="center" onclick="sortTable('d-table',6)">Marže MO ↕</th>
      <th class="center" onclick="sortTable('d-table',7)">Marže VO ↕</th>
    </tr></thead>
    <tbody id="d-tbody"></tbody>
  </table>
</div>

<!-- SÁČKY -->
<div class="section" id="sec-sacky">
  <div class="controls">
    <input class="search" id="s-search" placeholder="Hledat produkt nebo kód…" oninput="filterSacky()"/>
    <span class="count" id="s-count"></span>

  <div class="tbl-wrap">

      <th class="center" style="font-size:10px">MO</th><th class="center" style="font-size:10px">Marže</th>

    <tbody id="s-tbody"></tbody>
  </table>
  </div>
</div>

const GRAMAZE = [50,100,200,500,1000,3000];

function mc(m) {
  if (m >= 50) return 'class="m-high"';
  if (m >= 35) return 'class="m-mid"';
  return 'class="m-low"';
}

function renderDarky(data) {
  const tb = document.getElementById('d-tbody');
  tb.innerHTML = data.map(d => `<tr>
    <td><span class="badge">${d.kod}</span></td>
    <td>${d.nazev}</td>
    <td style="font-size:11px;color:#888">${d.obal}</td>
    <td class="right">${d.nakup.toFixed(1)} Kč</td>
    <td class="right"><strong>${d.mo} Kč</strong></td>
    <td class="right">${d.vo} Kč</td>
    <td class="center" ${mc(d.marze_mo)}>${d.marze_mo.toFixed(1)} %</td>
    <td class="center" ${mc(d.marze_vo)}>${d.marze_vo.toFixed(1)} %</td>
  </tr>`).join('');
  document.getElementById('d-count').textContent = `${data.length} produktů`;
}

function filterDarky() {
  const q = document.getElementById('d-search').value.toLowerCase();
  const ob = document.getElementById('d-obal').value.toLowerCase();
  const mf = document.getElementById('d-marze').value;
  const filtered = DARKY.filter(d => {
    if (q && !d.nazev.toLowerCase().includes(q) && !d.kod.toLowerCase().includes(q)) return false;
    if (ob && !d.obal.toLowerCase().includes(ob)) return false;
    if (mf === 'high' && d.marze_mo < 50) return false;
    if (mf === 'mid' && (d.marze_mo < 35 || d.marze_mo >= 50)) return false;
    if (mf === 'low' && d.marze_mo >= 35) return false;
    return true;
  });
  renderDarky(filtered);
}

function renderSacky(data) {
  const tb = document.getElementById('s-tbody');
  tb.innerHTML = data.map(d => {
    const cells = GRAMAZE.map(g => {
      const gd = d.gramaze[g];
      if (!gd) return '<td>—</td><td>—</td>';
      return `<td class="center"><strong>${gd.mo}</strong><br><span style="font-size:10px;color:#888">${gd.vo}</span></td>
              <td class="center" ${mc(gd.marze_mo)}>${gd.marze_mo.toFixed(0)}%</td>`;
    }).join('');
    return `<tr>
      <td><span class="badge">${d.kod}</span></td>
      <td>${d.nazev}</td>
      <td class="right">${d.kc.toFixed(0)} Kč</td>
      ${cells}
    </tr>`;
  }).join('');
  document.getElementById('s-count').textContent = `${data.length} produktů`;
}

function filterSacky() {
  const q = document.getElementById('s-search').value.toLowerCase();
  const filtered = SACKY.filter(d =>
    !q || d.nazev.toLowerCase().includes(q) || d.kod.toLowerCase().includes(q)
  );
  renderSacky(filtered);
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['darky','sacky'][i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
}

let sortDir = {};
function sortTable(tblId, col) {
  const key = tblId+col;
  sortDir[key] = !sortDir[key];
  const asc = sortDir[key];
  if (tblId === 'd-table') {
    const keys = ['kod','nazev','obal','nakup','mo','vo','marze_mo','marze_vo'];
    const sorted = [...DARKY].sort((a,b) => {
      const va = a[keys[col]], vb = b[keys[col]];
      return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    renderDarky(sorted);
  } else {
    const keys = ['kod','nazev','kc'];
    const sorted = [...SACKY].sort((a,b) => {
      const va = col < 3 ? a[keys[col]] : 0;
      const vb = col < 3 ? b[keys[col]] : 0;
      return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    renderSacky(sorted);
  }
}

// Init
renderDarky(DARKY);
renderSacky(SACKY);
