<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nutworld — Specifikace směsí</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#5c381f;--br:#83502e;--kraft:#f1e6da;--acc:#da1668;--leaf:#6fa044;--amb:#f7ab31}
body{font-family:"Source Sans 3",Arial,sans-serif;background:#e8ddd4;color:#2a1a0e;font-size:13px}
.controls{background:var(--bd);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.controls-title{font-family:"Exo 2",sans-serif;font-size:16px;font-weight:800;color:white}
.controls a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none}
.controls-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.cnt{color:rgba(255,255,255,.6);font-size:12px}
.btn-print{background:var(--amb);border:none;color:var(--bd);font-family:"Exo 2",sans-serif;font-weight:800;font-size:13px;padding:8px 20px;border-radius:20px;cursor:pointer}
.filter-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:10px 24px;background:#d4c0a8;align-items:center}
.search-inp{border:1.5px solid #a08060;border-radius:8px;padding:6px 12px;font-size:13px;font-family:inherit;min-width:220px;background:white}
.f-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #a08060;background:white;font-size:12px;font-weight:600;cursor:pointer;color:#5c381f}
.f-btn.active{background:var(--bd);color:white;border-color:var(--bd)}
.stats{padding:6px 24px;font-size:11px;color:#666;background:#e0d0bc}
.grid{max-width:1200px;margin:16px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.spec{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.spec-head{padding:12px 16px;color:white}
.spec-head.orechy{background:linear-gradient(135deg,#5c381f,#83502e)}
.spec-head.ovoce{background:linear-gradient(135deg,#6b2f2f,#da1668)}
.spec-head.seminko{background:linear-gradient(135deg,#2d5a1b,#6fa044)}
.spec-head.ostatni{background:linear-gradient(135deg,#2d3a4a,#546e7a)}
.spec-meta{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.spec-kod{font-family:monospace;font-size:10px;opacity:.75;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px}
.spec-cat{font-size:10px;opacity:.75}
.spec-nazev{font-family:"Exo 2",sans-serif;font-size:14px;font-weight:800;line-height:1.2}
.spec-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.sec label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--br);margin-bottom:5px}
.sec p{font-size:11.5px;line-height:1.75;color:#1a1a1a}
.al{font-weight:700;background:#fff0f0;border-radius:2px;padding:0 1px}
.al-box{background:#fff5f7;border:1.5px solid #da1668;border-radius:6px;padding:8px 12px;font-size:11.5px;color:#6b2f2f;line-height:1.5}
.al-box strong{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;color:#da1668}
.stopy-box{background:#fff8e1;border:1px solid var(--amb);border-radius:6px;padding:6px 10px;font-size:11px;color:#5c3000}
.spec-footer{display:grid;grid-template-columns:1fr 1fr;gap:6px;border-top:1px solid #f0e4d6;padding-top:10px}
.sf label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#bbb;display:block;margin-bottom:1px}
.sf span{font-size:11px;color:#555}
.missing{background:#f5f5f5;border:1.5px dashed #ccc;color:#aaa;padding:10px;border-radius:6px;font-size:11px;text-align:center}
@media print{
  .controls,.filter-wrap,.stats{display:none}
  body{background:white}
  .grid{display:block;margin:0;padding:0;max-width:none}
  .spec{page-break-inside:avoid;break-inside:avoid;margin-bottom:8mm;border-radius:0;box-shadow:none;border:1px solid #ccc}
}
@page{size:A4;margin:8mm}
</style>
</head>
<body>
<div class="controls">
  <span class="controls-title">📋 Specifikace směsí NW</span>
  <a href="/">← Rozcestník</a>
  <a href="/specifikace.html" style="color:rgba(255,255,255,.6);font-size:12px;text-decoration:none">← Specifikace produktů</a>

<div class="filter-wrap">

  <button class="f-btn active" onclick="setC('vse',this)">Vše</button>
  <button class="f-btn" onclick="setC('orechy',this)">🥜 Ořechy</button>
  <button class="f-btn" onclick="setC('ovoce',this)">🍓 Ovoce</button>
  <button class="f-btn" onclick="setC('seminko',this)">🌱 Semínka</button>
  <button class="f-btn" onclick="setC('ostatni',this)">📦 Ostatní</button>
</div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
